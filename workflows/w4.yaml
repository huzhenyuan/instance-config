# w4 Multi-reference → image (2 face refs + prompt → generated 2-person image).

workflow_id: w4
endpoint: image/compose
description: "Multi-reference → image (2 people)"

comfy_workflow_path: config/workflows/json/w4.json

# Tier resolution picks target aspect suited to the output domain.
#   "1"  3:4  balanced 2-person side-by-side
#   "2"  9:16 tall portrait (social-media vertical)
return_quality_sizes:
  "1":
    width:  1104
    height: 1472
  "2":
    width:  928
    height: 1664

comfy_input_root: /workspace/ComfyUI/input
gateway_input_subdir: gateway

param_inputs:
  input_img_1: {runtime_var: face_h1_relpath, type: url_image}
  input_img_2: {runtime_var: face_h2_relpath, type: url_image}

bindings:
  - node: "4"
    input: image
    source: runtime.face_h1_relpath
  - node: "5"
    input: image
    source: runtime.face_h2_relpath
  - node: "6"
    input: prompt
    source: runtime.positive_prompt
  - node: "7"
    input: prompt
    source: ""
  - node: "8"
    input: width
    source: runtime.target_width
  - node: "8"
    input: height
    source: runtime.target_height
  - node: "9"
    input: seed
    source: runtime.seed
  - node: "11"
    input: filename_prefix
    source: runtime.save_prefix

compliance:
  minor_detector:
    enabled: true
    action: reject
  face_count:
    # Dispatcher enforces the per-input tighter rule (each ref == 1 face);
    # this block stays descriptive for the policy dump.
    enabled: true
    min: 1
    max: 1
    action_on_violation: reject
  occlusion:
    enabled: false
  motion:
    enabled: false

preprocess:
  enhance_input_mode: none
postprocess: {}

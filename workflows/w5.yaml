# w5 Image → Video (portrait + prompt → short MP4).

workflow_id: w5
description: "Image → video"

comfy_workflow_path: config/workflows/json/w5.json

# Tier-selected portrait aspects. Output duration and fps are fixed by the
# generator; only the pixel resolution changes with tier.
return_quality_sizes:
  "1":
    width:  480
    height: 832
  "2":
    width:  720
    height: 1280

comfy_input_root: /data/comfyui/input
gateway_input_subdir: gateway

param_inputs:
  input_img_1: {runtime_var: input_relpath, type: url_image}

bindings:
  - node: "10"
    input: image
    source: runtime.input_relpath
  - node: "41"
    input: text
    source: runtime.positive_prompt
  - node: "60"
    input: width
    source: runtime.target_width
  - node: "60"
    input: height
    source: runtime.target_height
  - node: "70"
    input: noise_seed
    source: runtime.seed
  - node: "71"
    input: noise_seed
    source: runtime.seed
  - node: "99"
    input: filename_prefix
    source: runtime.save_prefix

compliance:
  minor_detector:
    enabled: true
    action: reject
  face_count:
    # Not applicable — w5 generates from a single source image and the prompt
    # may describe scenes without people.
    enabled: false
  occlusion:
    enabled: false
  motion:
    enabled: false

preprocess:
  enhance_input_mode: none
postprocess: {}

# w1 Image → Image policy (single-person portrait, face + prompt → image).

workflow_id: w1
endpoint: image/generate-from-face
description: "Image → Image — single-person portrait generation"

comfy_workflow_path: config/workflows/json/w1.json

return_quality_sizes:
  "1":
    width:  512
    height: 896
  "2":
    width:  768
    height: 1344

comfy_input_root: /data/comfyui/input
gateway_input_subdir: gateway
pose_library_subdir:   w1_xjoy/poses

# Binding grammar:
#   request.<field>  — value from client request body
#   runtime.<field>  — value computed by the runtime builder
#   default          — fallback when the resolved value is None

# Maps payload param names → runtime variable names consumed by bindings.
param_inputs:
  input_img_1: {runtime_var: face_relpath, type: url_image}
  input_img_2: {runtime_var: pose_relpath, type: url_image}

bindings:
  - node: "1"
    input: unet_name
    source: runtime.base_checkpoint
  - node: "6"
    input: image
    source: runtime.face_relpath
  - node: "7"
    input: image
    source: runtime.pose_relpath
  - node: "9"
    input: text
    source: request.positive_prompt
  - node: "10"
    input: text
    source: request.negative_prompt
    default: "plastic skin, airbrushed, waxy skin, CG render, deformed hands, watermark"
  - node: "14"
    input: seed
    source: runtime.seed
  - node: "16"
    input: filename_prefix
    source: runtime.save_prefix
  - node: "17"
    input: strength_model
    source: runtime.skin_lora_strength
  - node: "13"
    input: width
    source: runtime.target_width
  - node: "13"
    input: height
    source: runtime.target_height

# Ethnicity-keyed base / strength table. Keys match the upstream face detector's
# output buckets; unknown is the fallback when classification is ambiguous.
ethnicity_routing:
  east_asian:
    base_checkpoint: majicflus_v1.safetensors
    skin_lora_strength: 0.22
  southeast_asian:
    base_checkpoint: majicflus_v1.safetensors
    skin_lora_strength: 0.22
  white:
    base_checkpoint: STOIQOAfroditeFLUXXL_F1DAlpha.safetensors
    skin_lora_strength: 0.33
  latino:
    base_checkpoint: STOIQOAfroditeFLUXXL_F1DAlpha.safetensors
    skin_lora_strength: 0.33
  mixed:
    base_checkpoint: STOIQOAfroditeFLUXXL_F1DAlpha.safetensors
    skin_lora_strength: 0.33
  south_asian:
    base_checkpoint: fluxedUp_81_BF16.safetensors
    skin_lora_strength: 0.35
  black:
    base_checkpoint: fluxedUp_81_BF16.safetensors
    skin_lora_strength: 0.35
  unknown:
    base_checkpoint: majicflus_v1.safetensors
    skin_lora_strength: 0.22

compliance:
  minor_detector:
    enabled: true
    action: reject
  face_count:
    enabled: true
    min: 1
    max: 1
    action_on_violation: reject
  occlusion:
    enabled: false
  motion:
    enabled: false

preprocess:
  enhance_input_mode: none
postprocess:
  downscale_to_return_quality: true

# w6 Video → Video (multi-stage; scene is re-rendered server-side).

workflow_id: w6
description: "Video → video (server-rendered scene)"

# Multi-stage marker — dispatcher's multi-stage branch activates when this key
# is present. `comfy_workflow_path` (legacy single-workflow key) is unused.
comfy_workflow_stages:
  - name: stage1_ref
    description: "Generate per-source reference image from source firstframe"
    comfy_workflow_path: config/workflows/json/w6_stage1_qwen_edit.json
    # After this stage: the saved PNG is copied into ComfyUI input/ and its
    # new relpath is exposed to the next stage via runtime['stage1_ref_relpath'].
    output_consumer:
      match_filename_prefix: "w6_stage1_ref_"
      copy_to_comfy_input_as: "gateway/{task_id}_stage1_ref.png"
      set_runtime_key: "stage1_ref_relpath"
    bindings:
      - node: "4"
        input: image
        source: runtime.firstframe_relpath
      - node: "6"
        input: prompt
        source: runtime.stage1_prompt
      - node: "9"
        input: seed
        source: runtime.seed
      - node: "11"
        input: filename_prefix
        source: runtime.stage1_prefix
  - name: stage2_render
    description: "Final video render"
    comfy_workflow_path: config/workflows/json/w6_stage2_vace.json
    # The final stage's output becomes the gateway response file.
    is_final: true
    bindings:
      - node: "10"
        input: video
        source: runtime.video_relpath
      - node: "11"
        input: image
        source: runtime.stage1_ref_relpath
      - node: "41"
        input: text
        source: runtime.vace_positive
      - node: "70"
        input: noise_seed
        source: runtime.seed
      - node: "71"
        input: noise_seed
        source: runtime.seed
      - node: "99"
        input: filename_prefix
        source: runtime.save_prefix

# Single tier — resolution is fixed by the pipeline's calibrated training
# domain. Both tiers currently resolve to the same HD dimensions; an SD tier
# may be added later.
return_quality_sizes:
  "1":
    width: 720
    height: 1280
  "2":
    width: 720
    height: 1280

comfy_input_root: /data/comfyui/input
gateway_input_subdir: gateway

param_inputs:
  input_video_1: {runtime_var: video_relpath,      type: url_video}

# Preprocess values consumed by the runtime builder before stage 1 submits.
preprocess:
  target_fps: 16
  target_length_frames: 49
  target_width: 720
  target_height: 1280

compliance:
  minor_detector:
    enabled: true
    action: reject
  face_count:
    # MVP processes single-subject sources only.
    enabled: true
    min: 1
    max: 1
    action_on_violation: reject
  occlusion:
    enabled: false
  motion:
    enabled: false

postprocess:
  audio_mux: true

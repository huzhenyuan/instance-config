# w7 Video Face Swap (body/scene/audio preserved; face identity replaced).

workflow_id: w7
endpoint: video/swap-face
description: "Video face swap"

comfy_workflow_path: config/workflows/json/w7.json

# Per-tier sizing policy:
#   "1"  cap at 720 longest edge, reject >15s sources
#   "2"  cap at 1920 longest edge, reject >30s sources
# Sources at or below the cap are copied byte-for-byte (audio preserved).
# Sources above the cap get one aspect-preserving resize pass.
return_quality_sizes:
  "1":
    max_longest_edge: 720
    max_duration_s: 15
    max_frames: 450
  "2":
    max_longest_edge: 1920
    max_duration_s: 30
    max_frames: 900

comfy_input_root: /workspace/ComfyUI/input
gateway_input_subdir: gateway

param_inputs:
  input_video_1: {runtime_var: video_relpath, type: url_video}
  input_img_1:   {runtime_var: face_relpath,  type: url_image}

bindings:
  - node: "1"
    input: video
    source: runtime.video_relpath
  - node: "1"
    input: frame_load_cap
    source: runtime.frame_load_cap
  - node: "2"
    input: image
    source: runtime.face_relpath
  - node: "4"
    input: frame_rate
    source: runtime.source_fps
  - node: "4"
    input: audio
    source: runtime.audio_binding       # None → input removed (no-audio src)
  - node: "4"
    input: filename_prefix
    source: runtime.save_prefix

compliance:
  minor_detector:
    enabled: true
    action: reject
  face_count:
    # Dispatcher enforces the per-input tighter rule (ref image == 1 face,
    # source video not face-gated). This block stays descriptive for the
    # policy dump.
    enabled: false
  occlusion:
    enabled: false
  motion:
    enabled: false

preprocess:
  enhance_input_mode: none
postprocess: {}

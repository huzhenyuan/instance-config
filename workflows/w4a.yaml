workflow_id: w4a
description: "Image compose (2 people)"

comfy_workflow_path: config/workflows/json/w4a.json

# Single fixed resolution at the model's canonical training sweet spot.
# The return_img field is accepted for PRD compatibility but ignored —
# output is always 928×1664 (9:16 portrait). Gateway sanitise step
# transcodes PNG → WebP with all metadata stripped (sanitize.py).
return_quality_sizes:
  "1":
    width:  928
    height: 1664
  "2":
    width:  928
    height: 1664

comfy_input_root: /data/comfyui/input
gateway_input_subdir: gateway

bindings:
  - node: "1"
    input: ckpt_name
    source: runtime.base_checkpoint
  - node: "4"
    input: image
    source: runtime.face_h1_relpath
  - node: "5"
    input: image
    source: runtime.face_h2_relpath
  - node: "6"
    input: prompt
    source: runtime.final_positive_prompt
  - node: "7"
    input: prompt
    source: runtime.final_negative_prompt
  - node: "9"
    input: seed
    source: runtime.seed
  - node: "11"
    input: filename_prefix
    source: runtime.save_prefix

base_checkpoint: Qwen-Rapid-AIO-NSFW-v23.safetensors

compliance:
  minor_detector:
    enabled: true
    action: reject
  face_count:
    # Dispatcher enforces per-input rule: each ref image must contain
    # exactly one detectable face.
    enabled: true
    min: 1
    max: 1
    action_on_violation: reject
  occlusion:
    enabled: false
  motion:
    enabled: false

preprocess:
  enhance_input_mode: none
postprocess:
  downscale_to_return_quality: false

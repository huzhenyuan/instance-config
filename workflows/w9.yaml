workflow_id: w9
description: "Image generation v2"

comfy_workflow_path: config/workflows/json/w9.json

return_quality_sizes:
  "1":
    width:  768
    height: 1152
  "2":
    width:  832
    height: 1216

comfy_input_root: /workspace/ComfyUI/input
gateway_input_subdir: gateway

bindings:
  - node: "1"
    input: ckpt_name
    source: runtime.base_checkpoint
  - node: "2"
    input: text
    source: runtime.final_positive_prompt
  - node: "3"
    input: text
    source: runtime.final_negative_prompt
  - node: "7"
    input: image
    source: runtime.face_relpath
  - node: "9"
    input: width
    source: runtime.target_width
  - node: "9"
    input: height
    source: runtime.target_height
  - node: "10"
    input: seed
    source: runtime.seed
  - node: "12"
    input: filename_prefix
    source: runtime.save_prefix

base_checkpoint: cyberrealistic-pony-v17.safetensors

prompt_scaffold:
  positive_prefix: "score_9, score_8_up, score_7_up, "
  negative_prefix: "embedding:CyberRealistic_Negative_PONY_V2-neg, embedding:zPDXL3, embedding:NEGATIVE_HANDS, score_4, score_5, score_6, "

compliance:
  minor_detector:
    enabled: true
    action: reject
  face_count:
    enabled: true
    min: 1
    max: 1
    action_on_violation: reject
  occlusion:
    enabled: false
  motion:
    enabled: false

preprocess:
  enhance_input_mode: none
postprocess:
  downscale_to_return_quality: false

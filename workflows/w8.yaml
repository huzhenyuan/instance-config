# w8 Image → video (v2 backend).
#
# Partner-facing contract is identical to w5a (input_img + positive_prompt
# + negative_prompt + return_video + enhance_input + request_id), exposed
# at /video/generate-from-image-v2. The negative_prompt is logged then
# ignored — the backend supplies its own stability terms.

workflow_id: w8
description: "Image → video v2"

comfy_workflow_path: config/workflows/json/w8.json

# return_video tier is accepted for parity with w5a; v1 backend resolves
# every tier to the same fixed bucket.
return_quality_sizes:
  "1":
    width:  704
    height: 640
  "2":
    width:  704
    height: 640

comfy_input_root: /workspace/ComfyUI/input
gateway_input_subdir: gateway

bindings:
  - node: "97"
    input: image
    source: runtime.input_relpath
  - node: "293"
    input: text
    source: runtime.positive_prompt
  - node: "289"
    input: text
    source: runtime.negative_prompt
    default: "色调艳丽，过曝，静态，细节模糊不清，字幕，风格，作品，画作，画面，静止，整体发灰，最差质量，低质量，JPEG压缩残留，丑陋的，残缺的，多余的手指，画得不好的手部，画得不好的脸部，畸形的，毁容的，形态畸形的肢体，手指融合，静止不动的画面，杂乱的背景，三条腿，背景人很多，倒着走"
  - node: "286"
    input: noise_seed
    source: runtime.seed
  - node: "108"
    input: filename_prefix
    source: runtime.save_prefix

compliance:
  minor_detector:
    enabled: true
    action: reject
  face_count:
    enabled: false
  occlusion:
    enabled: false
  motion:
    enabled: false

preprocess:
  enhance_input_mode: none
postprocess: {}

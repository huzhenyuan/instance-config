# w5a Image → Video (Wan 2.2 I2V + NSFW-22 base + POV Kissing conditional LoRA).
#
# Replaces w5 at the HTTP layer (/video/generate-from-image) while preserving
# the PRD request contract (input_img + positive_prompt + negative_prompt +
# return_video + enhance_input). Differences from w5:
#   - No LLM densifier: partner prompt is forwarded verbatim. The NSFW action
#     pattern library (docs/xjoy/api/w5a_scene_templates.md, pending) teaches
#     partners to write the 6-verb continuous-verb-chain directly.
#   - POV Kissing LoRA is loaded alongside NSFW-22 but bound to
#     strength_model 0.0 by default; the runtime detects kiss semantics in
#     the positive prompt and flips both H/L strengths to 1.0 for kiss shots.
#   - Fixed single output resolution 528×720 @ 16fps × 81 frames (5.06 s).
#     Both return_video tiers map here; AR-aware HD tier is future work.

workflow_id: w5a
description: "Image → video"

comfy_workflow_path: config/workflows/json/w5a.json

# PRD accepts return_video="1"|"2" (SD|HD). Both map to 528×720 in v1 —
# the NSFW-22 LoRA author documents that 720P I2V is poor on this stack,
# and the Wan 2.2 I2V sweet-spot for 3:4 portraits is this tier. Aspect-
# aware HD routing is tracked as session-21+ polish, not shipped here.
return_quality_sizes:
  "1":
    width:  528
    height: 720
  "2":
    width:  528
    height: 720

comfy_input_root: /data/comfyui/input
gateway_input_subdir: gateway

bindings:
  - node: "10"
    input: image
    source: runtime.input_relpath
  - node: "24"
    input: strength_model
    source: runtime.kiss_lora_strength
  - node: "34"
    input: strength_model
    source: runtime.kiss_lora_strength
  - node: "41"
    input: text
    source: runtime.positive_prompt
  - node: "42"
    input: text
    source: runtime.negative_prompt
    default: "色调艳丽，过曝，静态，细节模糊不清，字幕，风格，作品，画作，画面，静止，整体发灰，最差质量，低质量，JPEG压缩残留，丑陋的，残缺的，多余的手指，画得不好的手部，画得不好的脸部，畸形的，毁容的，形态畸形的肢体，手指融合，静止不动的画面，杂乱的背景，三条腿，背景人很多，倒着走"
  - node: "60"
    input: width
    source: runtime.target_width
  - node: "60"
    input: height
    source: runtime.target_height
  - node: "70"
    input: noise_seed
    source: runtime.seed
  - node: "71"
    input: noise_seed
    source: runtime.seed
  - node: "99"
    input: filename_prefix
    source: runtime.save_prefix

compliance:
  minor_detector:
    enabled: true
    action: reject
  face_count:
    # Not applicable — w5a generates from a single source image; the prompt
    # may describe scenes without a clearly detectable face (back views,
    # partial-face composition).
    enabled: false
  occlusion:
    enabled: false
  motion:
    enabled: false

preprocess:
  enhance_input_mode: none
postprocess: {}
